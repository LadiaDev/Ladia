<!DOCTYPE html>

<html>

<head>

    <title>Spurfia</title>

    <style>

        body {

            background-color: #f0f0f6;

            font-family: -apple-system, sans-serif;

            margin: 0;

            padding: 20px;

        }

        .header {

            text-align: center;

            padding: 20px;

            background-color: #1c1c1e;

            color: #ff3b30;

            border-radius: 12px;

        }

        .package-list {

            margin-top: 20px;

        }

        .package-card {

            background-color: white;

            padding: 15px;

            margin-bottom: 10px;

            border-radius: 10px;

        }

        .install-btn {

            background-color: #ff3b30;

            color: white;

            border: none;

            padding: 8px 15px;

            border-radius: 15px;

            float: right;

            font-weight: bold;

        }

    </style>

</head>

<body>



    <div class="header">

        <h1>Spurfia</h1>

        <p>Welcome to your custom package manager</p>

    </div>



    <div class="package-list">

        <div class="package-card">

            <button class="install-btn">GET</button>


            <h3>Spurfia Theme Pro</h3>

            <p>Change your app layouts to match Spurfia colors.</p>

        </div>

        

        <div class="package-card">

            <button class="install-btn">GET</button>

            <h3>Custom Dock</h3>

            <p>Make your iPhone dock completely transparent.</p>

        </div>

    </div>



</body>

</html>
